"$schema" = "https://ubcode.useblocks.com/ubproject.schema.json"

[project]
name = "DIShboard"
srcdir = "../src"



################ NEEEDS CONFIGURATION ################
[needs]
# Integrate with Sphinx-Needs
external_needs = []

[[needs.types]]
directive = "req"
title = "Requirement"
prefix = "REQ_"
color = "#BFD8D2"

[[needs.types]]
directive = "spec"
title = "Specification"
prefix = "SPEC_"
color = "#FEDCD2"

[[needs.types]]
directive = "test_case"
title = "Test Case"
prefix = "TC_"
color = "#D4EDDA" # Light green

[[needs.types]]
directive = "code_impl"
title = "Implementation"
prefix = "IMPL_"
color = "#E2E3E5" # Light gray

################ LINKS CONFIGURATION ################
# Link for Specification -> Requirement (already standard)
[needs.links.parent]
incoming = "child of"
outgoing = "parent to"

# Link for Code -> Specification
[needs.links.implements]
incoming = "implemented by"
outgoing = "implements"

# Link for Test Case -> Code/Specification
[needs.links.tests]
incoming = "tested by"
outgoing = "tests"

# Link to API documentation
[needs.links.api]
incoming = "documented by"
outgoing = "documents API"

################# CONFIGURE CODELINKS (Traces python code & pytest files) ##
[codelinks]
set_local_url = true            # Set to true to enable local code html and URL generation
local_url_field = "local-url"   # Need's field name for local URL
set_remote_url = false           # Set to true to enable remote url to be generated

# Define codelinks paths
[codelinks.projects.dishboard.source_discover]
src_dir = "../../"
comment_type = "python"
gitignore = false

[codelinks.projects.dishboard.analyse]
get_oneline_needs = true

# This defines the template for code tracing comments
[codelinks.projects.dishboard.analyse.oneline_comment_style]
start_sequence = "@"
#end_sequence = "\r\n"
field_split_char = ","
# The structure of your in-code tracker: @Title, ID, Type, Links
needs_fields = [
    { name = "title", type = "str" },
    { name = "id", type = "str" },
    { name = "type", type = "str", default = "code_impl" },
    { name = "implements", type = "list[str]", default = [] }
]


################### Other ##################

[parse]
# Sphinx directive support
[parse.extend_directives.automodule]
argument = true
options = true
description = "Auto-document Python module"
extension = "sphinx.ext.autodoc"

[parse.extend_directives.automodule.named_options]
members = {description = "Include module members"}
undoc-members = {description = "Include undocumented members"}

[parse.extend_roles.py-func]
description = "Reference to Python function"
extension = "sphinx.domains.python"

[format_rst]
# Sphinx-friendly formatting
paragraph_line_length = 79  # PEP 8 line length
directive_indent = 3
field_list_indent = 2

[scripts]
# Sphinx build commands
#html = "sphinx-build -b html {{confdir}} {{confdir}}/_build/html"
#linkcheck = "sphinx-build -b linkcheck {{confdir}} {{confdir}}/_build/linkcheck"
#"docs:live" = { cmd = "sphinx-autobuild {{confdir}} {{confdir}}/_build/html --host 0.0.0.0", terminal = "docs-server" }

[server]
# MCP server configuration
index_on_save = true
