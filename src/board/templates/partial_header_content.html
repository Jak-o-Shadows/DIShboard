{% load static %}
<!-- HTMX (server-driven interactions) -->
<script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js" integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz" crossorigin="anonymous"></script>
<!-- Pico.css (small, offline-friendly CSS framework) - using CDN for now; see note below to vendor locally -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
<!-- Vega plotting -->
<script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
<script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
<script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
<script src="https://cdn.jsdelivr.net/npm/vega-webgl-renderer"></script>
<!-- Project Custom CSS -->
<link rel="stylesheet" href="{% static 'board/board.css' %}">
<!-- HTMX helper: immediately replace a target with a temporary inline spinner
		 when the trigger has `data-immediate-target="<selector>"`. The real
		 response will replace the target when the request completes. -->
<script>
document.addEventListener('htmx:beforeRequest', function(evt){
	try{
		var trigger = evt && evt.detail && evt.detail.elt;
		if(!trigger) return;
		var sel = trigger.getAttribute && trigger.getAttribute('spinner-before-load-target');
		if(!sel) return;
		document.querySelectorAll(sel).forEach(function(target){
			// insert a small inline spinner that will be replaced by the server response
			target.innerHTML = '<p>Loading...</p><div aria-busy="true" aria-live="polite"></div>';
		});
	}catch(e){ console.error(e); }
});
</script>
