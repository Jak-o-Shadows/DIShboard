<table>
    <thead>
        <tr>
            <th>Timestamp</th>
            <th>Type</th>
            <th>Summary</th>
        </tr>
    </thead>
    <tbody>
        {% for hub_entry in pdus %}
        <tr class="pdu-row" hx-get="{% url 'board:pdu_detail' hub_entry.pk %}" hx-trigger="click" hx-target="#detail-panel" hx-swap="innerHTML">
            <td class="timestamp">{{ hub_entry.timestamp|date:"H:i:s.u" }}</td>
            <td>{{ hub_entry.pdu_type }}</td>
            <td>
                {% with pdu=hub_entry.content_object %}
                    {% include "pdus/partial_pdu_summary.html" %}
                {% endwith %}
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="3">Waiting for traffic...</td></tr>
        {% endfor %}
    </tbody>
</table>
